name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: roku-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    name: Verify Roku app
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify repository
        run: make verify

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    name: Create GitHub release artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - verify
    environment:
      name: release
      deployment: false
    permissions:
      contents: read
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Create release bot token
        id: release-bot
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          client-id: ${{ vars.PUTIO_RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.PUTIO_RELEASE_BOT_PRIVATE_KEY }}
          permission-contents: write

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.release-bot.outputs.token }}

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.0.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release Roku package
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer@13.0.1
            @semantic-release/release-notes-generator@14.1.1
            @semantic-release/exec@7.1.0
            @semantic-release/github@12.0.8
            conventional-changelog-conventionalcommits@9.1.0
        env:
          GITHUB_TOKEN: ${{ steps.release-bot.outputs.token }}
          GIT_AUTHOR_NAME: ${{ steps.release-bot.outputs.app-slug }}[bot]
          GIT_AUTHOR_EMAIL: ${{ steps.release-bot.outputs.app-slug }}[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ steps.release-bot.outputs.app-slug }}[bot]
          GIT_COMMITTER_EMAIL: ${{ steps.release-bot.outputs.app-slug }}[bot]@users.noreply.github.com

      - name: Upload hosted release payload
        if: ${{ steps.semantic.outputs.new_release_published == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: putio-roku-hosted-${{ steps.semantic.outputs.new_release_version }}
          path: dist/public
          if-no-files-found: error

  deploy:
    if: ${{ needs.release.outputs.new_release_published == 'true' }}
    name: Deploy released ZIP to roku.put.io
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - release
    environment:
      name: production
      url: https://roku.put.io/v2.zip
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
      AWS_ROUTE53_ZONE_ID: ${{ vars.AWS_ROUTE53_ZONE_ID }}
      AWS_WILDCARD_CERT_ARN: ${{ vars.AWS_WILDCARD_CERT_ARN }}
      ROKU_DOMAIN: ${{ vars.ROKU_DOMAIN || 'roku.put.io' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.0.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download hosted release payload
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: putio-roku-hosted-${{ needs.release.outputs.new_release_version }}
          path: dist/public

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

      - name: Deploy roku.put.io
        run: pnpm deploy:production
