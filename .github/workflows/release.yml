name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: roku-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    name: Verify Roku app
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify repository
        run: make verify

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - verify
    environment:
      name: release
      deployment: false
    permissions:
      contents: read
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Create release bot token
        id: release-bot
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.PUTIO_RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.PUTIO_RELEASE_BOT_PRIVATE_KEY }}
          permission-contents: write

      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.release-bot.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release Roku package
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer@13.0.1
            @semantic-release/release-notes-generator@14.1.1
            @semantic-release/exec@7.1.0
            @semantic-release/git@10.0.1
            @semantic-release/github@12.0.8
            conventional-changelog-conventionalcommits@9.1.0
        env:
          GITHUB_TOKEN: ${{ steps.release-bot.outputs.token }}
          GIT_AUTHOR_NAME: ${{ steps.release-bot.outputs.app-slug }}[bot]
          GIT_AUTHOR_EMAIL: ${{ steps.release-bot.outputs.app-slug }}[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ steps.release-bot.outputs.app-slug }}[bot]
          GIT_COMMITTER_EMAIL: ${{ steps.release-bot.outputs.app-slug }}[bot]@users.noreply.github.com

  deploy:
    if: ${{ needs.release.outputs.new_release_published == 'true' }}
    name: Deploy released ZIP
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - release
    environment:
      name: production
      url: https://${{ vars.ROKU_DOMAIN }}/v2.zip
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROUTE53_ZONE_ID: ${{ vars.AWS_ROUTE53_ZONE_ID }}
      AWS_WILDCARD_CERT_ARN: ${{ vars.AWS_WILDCARD_CERT_ARN }}
      ROKU_DOMAIN: ${{ vars.ROKU_DOMAIN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare hosted release payload
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          set -euo pipefail

          release_asset="putio-roku-v${RELEASE_VERSION}.zip"
          release_tag="v${RELEASE_VERSION}"

          rm -rf dist/public dist/release
          mkdir -p dist/public/releases/v2 dist/release

          gh release download "${release_tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${release_asset}" \
            --dir dist/release

          release_zip="dist/release/${release_asset}"
          test -f "${release_zip}"
          unzip -t "${release_zip}" > /dev/null

          cp "${release_zip}" dist/public/v2.zip
          cp "${release_zip}" "dist/public/releases/v2/${RELEASE_VERSION}.zip"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

      - name: Deploy Roku site
        run: pnpm deploy:production
